<ion-tabs>

  <ion-tab-bar slot="bottom" color="light">
    
    <ion-tab-button tab="dashboard">
      <ion-icon name="home"></ion-icon>
      <ion-label>{{ 'MENU.DASHBOARD' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="heatmap">
      <ion-icon name="calendar"></ion-icon>
      <ion-label>{{ 'MENU.TRACKER' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="milestones">
      <ion-icon name="checkmark-circle"></ion-icon>
      <ion-label>{{ 'MENU.MILESTONES' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="word-count">
      <ion-icon name="chatbubbles"></ion-icon>
      <ion-label>{{ 'MENU.WORD_COUNT' | translate }}</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="settings">
      <ion-icon name="chatbubbles"></ion-icon>
      <ion-label>{{ 'MENU.SETTINGS' | translate }}</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
